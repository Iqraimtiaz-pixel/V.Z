<!DOCTYPE html>
<html>
<head>
  <title>VibeZ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPage" class="center">
  <h1 class="logo">VibeZ ✨</h1>
  <input type="text" id="username" placeholder="Enter your vibe name">
  <button onclick="login()">Enter Vibe</button>
</div>

<div id="chatPage">
  <div class="header">
    <h2>VibeZ Chat</h2>
    <span id="status">Anonymous Mode 🔒</span>
  </div>

  <div id="chatBox"></div>

  <div class="inputArea">
    <input type="text" id="msg" placeholder="Type a vibe...">
    <button onclick="sendMsg()">➤</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
